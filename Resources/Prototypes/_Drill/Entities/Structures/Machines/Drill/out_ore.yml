- type: entity
  abstract: true
  parent: DrillPortBase
  id: DrillPortOutputOreBase
  components:
  - type: Sprite
    sprite: _Drill/Machines/Drill/out_ore_0.rsi
  - type: DrillPort
    adjacency: edge
  - type: DrillPortOutputOre
    spawnTable: !type:NestedSelector
      tableId: RandomOreBasicTable
    outputSound:
      path: /Audio/Voice/Human/malescream_3.ogg

- type: entity
  parent: DrillPortOutputOreBase
  id: DrillPortOutputOreZero
  name: basic ore output port
  description: A basic ore output port built before you got here. It looks indestructible.
  components:
  - type: Sprite
    sprite: _Drill/Machines/Drill/out_ore_0.rsi

